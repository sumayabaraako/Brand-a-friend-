<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Storybook Van Sanne</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <div class="overlay" id="overlay" aria-hidden="true"></div>

  <div class="scene">
    <div class="book" id="book" role="button" tabindex="0" aria-expanded="false">

      <div class="cover" aria-hidden="true">
        <img src="foto's/nieuwebanner.png" alt="Boek cover">
      </div>

     
      <div class="inside" aria-hidden="true">
        <img src="foto's/inside.png" alt="Binnenkant / moodboard">
      </div>

      
      <button class="close" id="closeBtn" aria-label="Sluit boek">✕</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
